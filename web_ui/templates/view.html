<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Artifact Viewer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}" />
  </head>
  <body class="viewer-shell">
    <div class="card">
      <div class="viewer-head">
        <div>
          <a class="btn btn-ghost" href="/">← Back to dashboard</a>
          <h1>{{ file_kind or 'Artifact' }}</h1>
          <div class="viewer-meta">{{ path.rsplit('/', 1)[0] if '/' in path else path }} · {{ file_size or 0 }} bytes</div>
        </div>
        <span class="status-pill">Workspace artifact</span>
      </div>
      <div class="viewer-content">
        {{ content|safe }}
      </div>
    </div>
  </body>
</html>
